<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Form Validation & Dynamic DOM</h1>
        </header>
        
        <nav class="main-nav">
            <a href="#" class="nav-link active" data-route="home">Home</a>
            <a href="#" class="nav-link" data-route="register">Register</a>
            <a href="#" class="nav-link" data-route="dashboard">Dashboard</a>
        </nav>
        
        <main id="app"></main>
    </div>
    
    <script>
        class PasswordValidator {
            static checkStrength(password) {
                const checks = {
                    length: password.length >= 8,
                    uppercase: /[A-Z]/.test(password),
                    lowercase: /[a-z]/.test(password),
                    numbers: /[0-9]/.test(password),
                    special: /[!@#$%^&*(),.?":{}|<>]/.test(password)
                };
                
                const strength = Object.values(checks).filter(Boolean).length;
                let level = 'weak';
                if (strength >= 4) level = 'strong';
                else if (strength >= 3) level = 'medium';
                
                return { level, checks };
            }
        }
        
        class FormValidator {
            validateEmail(email) {
                const emailRegex = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
                if (!email) return 'Email is required';
                if (!emailRegex.test(email)) return 'Invalid email';
                return null;
            }
            
            validatePassword(password) {
                if (!password) return 'Password required';
                if (password.length < 8) return 'Minimum 8 characters';
                return null;
            }
            
            validateConfirmPassword(password, confirm) {
                if (password !== confirm) return 'Passwords do not match';
                return null;
            }
            
            validateUsername(username) {
                if (!username) return 'Username required';
                if (username.length < 3) return 'Minimum 3 characters';
                if (!/^[a-zA-Z0-9_]+$/.test(username)) return 'Letters, numbers, underscores only';
                return null;
            }
            
            validateAge(age) {
                if (!age) return null;
                const ageNum = parseInt(age);
                if (isNaN(ageNum)) return 'Invalid age';
                if (ageNum < 18) return 'Must be 18 or older';
                return null;
            }
        }
        
        class HomeComponent {
            render() {
                return `
                    <div style="text-align: center; padding: 40px;">
                        <button class="btn btn-primary" onclick="app.router.navigate('register')">Register</button>
                        <button class="btn btn-secondary" onclick="app.router.navigate('dashboard')" style="margin-left: 10px;">Dashboard</button>
                    </div>
                `;
            }
            init() {}
        }
        
        class RegisterComponent {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('app_users') || '[]');
            }
            
            saveUsers() {
                localStorage.setItem('app_users', JSON.stringify(this.users));
            }
            
            render() {
                return `
                    <form id="registrationForm">
                        <div class="form-group">
                            <label>Username</label>
                            <input type="text" id="username">
                            <div class="error-message" id="usernameError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email">
                            <div class="error-message" id="emailError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="password">
                            <div class="password-strength">
                                <div class="strength-bar">
                                    <div class="strength-fill" id="strengthFill"></div>
                                </div>
                            </div>
                            <div class="error-message" id="passwordError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Confirm Password</label>
                            <input type="password" id="confirmPassword">
                            <div class="error-message" id="confirmPasswordError"></div>
                        </div>
                        
                        <div class="form-group">
                            <label>Age</label>
                            <input type="number" id="age">
                            <div class="error-message" id="ageError"></div>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">Register</button>
                        <button type="button" class="btn btn-secondary" onclick="document.getElementById('registrationForm').reset()">Reset</button>
                    </form>
                `;
            }
            
            init() {
                const form = document.getElementById('registrationForm');
                const validator = new FormValidator();
                
                const validateField = (id, validationFn) => {
                    const input = document.getElementById(id);
                    const error = document.getElementById(`${id}Error`);
                    const result = validationFn(input.value);
                    if (result) {
                        error.textContent = result;
                        error.classList.add('show');
                        input.classList.add('error');
                        return false;
                    } else {
                        error.classList.remove('show');
                        input.classList.remove('error');
                        return true;
                    }
                };
                
                document.getElementById('password').addEventListener('input', (e) => {
                    const strength = PasswordValidator.checkStrength(e.target.value);
                    const fill = document.getElementById('strengthFill');
                    fill.className = `strength-fill ${strength.level}`;
                });
                
                form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const confirm = document.getElementById('confirmPassword').value;
                    const age = document.getElementById('age').value;
                    
                    const valid = {
                        username: validateField('username', (v) => validator.validateUsername(v)),
                        email: validateField('email', (v) => validator.validateEmail(v)),
                        password: validateField('password', (v) => validator.validatePassword(v)),
                        confirm: validateField('confirmPassword', (v) => validator.validateConfirmPassword(password, v)),
                        age: validateField('age', (v) => validator.validateAge(v))
                    };
                    
                    if (Object.values(valid).every(v => v === true)) {
                        if (this.users.some(u => u.email === email)) {
                            alert('Email already exists');
                            return;
                        }
                        
                        this.users.push({
                            id: Date.now(),
                            username,
                            email,
                            age: age || 'Not specified',
                            registeredAt: new Date().toISOString()
                        });
                        this.saveUsers();
                        alert('Registration successful');
                        form.reset();
                        app.router.navigate('dashboard');
                    } else {
                        alert('Please fix errors');
                    }
                });
            }
        }
        
        class DashboardComponent {
            constructor() {
                this.users = JSON.parse(localStorage.getItem('app_users') || '[]');
            }
            
            saveUsers() {
                localStorage.setItem('app_users', JSON.stringify(this.users));
            }
            
            render() {
                return `
                    <div>
                        <div class="stats-grid">
                            <div class="stat-card">
                                <h3>Total Users</h3>
                                <div class="stat-number" id="totalUsers">${this.users.length}</div>
                            </div>
                        </div>
                        
                        <div class="user-list">
                            <div id="userListContainer"></div>
                        </div>
                        
                        <div style="margin-top: 20px; text-align: center;">
                            <button class="btn btn-primary" onclick="app.router.navigate('register')">Add User</button>
                            <button class="btn btn-secondary" onclick="app.dashboardComponent.clearAll()">Clear All</button>
                        </div>
                    </div>
                `;
            }
            
            renderUserList() {
                if (this.users.length === 0) {
                    return '<div style="text-align: center; padding: 40px;">No users</div>';
                }
                
                return this.users.map(user => `
                    <div class="user-item">
                        <div>
                            <strong>${this.escapeHtml(user.username)}</strong><br>
                            ${this.escapeHtml(user.email)}<br>
                            <small>Age: ${user.age} | Registered: ${new Date(user.registeredAt).toLocaleDateString()}</small>
                        </div>
                        <button class="delete-btn" onclick="app.dashboardComponent.deleteUser(${user.id})">Delete</button>
                    </div>
                `).join('');
            }
            
            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
            
            init() {
                window.app.dashboardComponent = this;
                this.updateDisplay();
            }
            
            updateDisplay() {
                const totalEl = document.getElementById('totalUsers');
                if (totalEl) totalEl.textContent = this.users.length;
                
                const container = document.getElementById('userListContainer');
                if (container) container.innerHTML = this.renderUserList();
            }
            
            deleteUser(id) {
                if (confirm('Delete user?')) {
                    this.users = this.users.filter(u => u.id !== id);
                    this.saveUsers();
                    this.updateDisplay();
                }
            }
            
            clearAll() {
                if (confirm('Delete all users?')) {
                    this.users = [];
                    this.saveUsers();
                    this.updateDisplay();
                }
            }
        }
        
        class Router {
            constructor() {
                this.routes = {};
            }
            
            addRoute(path, component) {
                this.routes[path] = component;
            }
            
            navigate(path) {
                const Component = this.routes[path];
                const app = document.getElementById('app');
                
                if (Component) {
                    const instance = new Component();
                    app.innerHTML = instance.render();
                    if (instance.init) instance.init();
                    this.updateNav(path);
                }
            }
            
            updateNav(path) {
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('data-route') === path) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }
        }
        
        const app = { router: null, dashboardComponent: null };
        window.app = app;
        
        document.addEventListener('DOMContentLoaded', () => {
            app.router = new Router();
            app.router.addRoute('home', HomeComponent);
            app.router.addRoute('register', RegisterComponent);
            app.router.addRoute('dashboard', DashboardComponent);
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    app.router.navigate(link.getAttribute('data-route'));
                });
            });
            
            app.router.navigate('home');
        });
    </script>
</body>
</html>
